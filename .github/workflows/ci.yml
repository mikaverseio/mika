name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  unit:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Lint (affected)
        run: npx nx affected -t lint --base=origin/main --head=HEAD

      - name: Test (affected)
        run: npx nx affected -t test --base=origin/main --head=HEAD

      - name: Build core
        run: npx nx build core

      - name: Build ui-material
        run: npx nx build ui-material

      - name: Typecheck demo-material
        run: npx nx typecheck demo-material

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start mock API (blog)
        run: npm run api:demo2 &
        shell: bash

      - name: Wait for mock API
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: E2E tests
        run: npx nx run-many -t e2e --projects=demo-material-e2e

      - name: Fix CI (Nx Cloud self-healing)
        run: npx nx fix-ci
        if: always()
