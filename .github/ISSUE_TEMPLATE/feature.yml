name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to Mika.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      placeholder: What use case or limitation is driving this request?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe what you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Are there workarounds you've tried?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "@mikaverse/core (engine)"
        - "@mikaverse/ui-material (Angular Material UI)"
        - "Demo app"
        - "Documentation"
        - "Developer tooling (generators, CLI)"
        - "Other"
    validations:
      required: true
