name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below.

  - type: input
    id: version
    attributes:
      label: Mika version
      placeholder: e.g. 0.1.0-alpha.1
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Define entity config with...
        2. Navigate to...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant entity config (if applicable)
      render: typescript

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - Angular version:
        - @mikaverse/core version:
        - @mikaverse/ui-material version:
        - Browser:
